<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Pro | Custom Order</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --bg-dark: #000000;
            --card-bg: rgba(20, 22, 28, 0.95);
            --item-hover: rgba(0, 212, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: #fff; font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        /* --- GENERADOR --- */
        #ui-generator {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background: #0a0a0a; overflow-y: auto; padding: 20px; box-sizing: border-box;
        }
        .card { 
            background: #000; padding: 25px; border-radius: 15px; border: 1px solid #222; 
            width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .section-label { color: var(--neon-blue); font-size: 11px; font-weight: bold; margin: 15px 0 8px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        input { 
            width: 100%; padding: 10px; background: #080808; border: 1px solid #333; 
            border-radius: 6px; color: #fff; box-sizing: border-box; font-size: 12px; outline: none; 
        }
        input:focus { border-color: var(--neon-blue); }
        .btn-main { 
            width: 100%; padding: 16px; background: var(--neon-blue); border: none; 
            font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px; 
            text-transform: uppercase; font-size: 13px; color: #000; transition: 0.3s;
        }

        /* --- PLAYER INTERFACE --- */
        #ui-player {
            display: none; width: 100%; height: 100vh;
            justify-content: center; align-items: center;
            position: relative; background-size: cover; background-position: center;
        }
        #overlay-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.95) 100%); z-index: 1; }

        #content-wrapper { z-index: 10; width: 90%; max-width: 440px; text-align: center; }

        .tabs-audio { display: flex; gap: 12px; margin-bottom: 25px; justify-content: center; flex-wrap: wrap; }
        .tab-btn { cursor: pointer; text-align: center; opacity: 0.4; transition: 0.3s; min-width: 60px; display: none; }
        .tab-btn.active { opacity: 1; transform: translateY(-3px); }
        .tab-btn img { width: 40px; height: 26px; border-radius: 4px; display: block; margin: 0 auto 6px; border: 1px solid rgba(255,255,255,0.2); }
        .tab-btn span { font-size: 10px; font-weight: bold; text-transform: uppercase; }

        .server-list { display: none; flex-direction: column; gap: 10px; max-height: 55vh; overflow-y: auto; padding: 5px; }
        .server-list.active { display: flex; }

        .server-item {
            background: var(--card-bg);
            border-radius: 10px; padding: 14px 18px;
            display: flex; align-items: center;
            gap: 15px; cursor: pointer;
            transition: 0.2s; border: 1px solid rgba(0, 212, 255, 0.3);
        }
        .server-item:hover { background: var(--item-hover); transform: translateX(5px); border-color: var(--neon-blue); }
        .play-icon { color: var(--neon-blue); font-size: 18px; }
        .server-info { text-align: left; }
        .server-info h4 { margin: 0; font-size: 13px; font-weight: 800; }
        .server-info p { margin: 0; font-size: 10px; color: #aaa; text-transform: uppercase; margin-top: 2px; }

        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; visibility: hidden; z-index: 100; background: #000; }
        #video-container.active { opacity: 1; visibility: visible; }
        
        /* Iframe limpio sin sandbox */
        iframe { width: 100%; height: 100%; border: none; }

        #btn-back { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8); color: #fff; border: 1px solid var(--neon-blue); padding: 8px 16px; border-radius: 5px; cursor: pointer; z-index: 200; display: none; font-size: 12px; font-weight: bold; }

        #box-link { display:none; margin-top:20px; border:1px dashed var(--neon-blue); padding:15px; background: #050505; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="ui-generator">
        <div class="card">
            <h2 style="text-align:center; color:var(--neon-blue); margin-top:0; font-size: 22px;">Generador Multi-Audio</h2>
            
            <div style="max-height: 420px; overflow-y: auto; padding-right: 10px;">
                <span class="section-label">🇲🇽 Latino (Máx 4)</span>
                <div class="grid-inputs">
                    <input type="text" class="lat-in" placeholder="L1"><input type="text" class="lat-in" placeholder="L2">
                    <input type="text" class="lat-in" placeholder="L3"><input type="text" class="lat-in" placeholder="L4">
                </div>

                <span class="section-label">🇯🇵 Japonés (Máx 4)</span>
                <div class="grid-inputs">
                    <input type="text" class="jap-in" placeholder="J1"><input type="text" class="jap-in" placeholder="J2">
                    <input type="text" class="jap-in" placeholder="J3"><input type="text" class="jap-in" placeholder="J4">
                </div>

                <span class="section-label">🇪🇸 Castellano (Máx 4)</span>
                <div class="grid-inputs">
                    <input type="text" class="cas-in" placeholder="C1"><input type="text" class="cas-in" placeholder="C2">
                    <input type="text" class="cas-in" placeholder="C3"><input type="text" class="cas-in" placeholder="C4">
                </div>

                <span class="section-label">🇺🇸 Inglés (Máx 4)</span>
                <div class="grid-inputs">
                    <input type="text" class="ing-in" placeholder="I1"><input type="text" class="ing-in" placeholder="I2">
                    <input type="text" class="ing-in" placeholder="I3"><input type="text" class="ing-in" placeholder="I4">
                </div>

                <span class="section-label">Poster URL (Fondo)</span>
                <input type="text" id="bg-in" placeholder="URL de la imagen">
            </div>
            
            <button class="btn-main" onclick="buildLink()">GENERAR ENLACE LARGO</button>
            
            <div id="box-link">
                <input type="text" id="out-url" readonly style="margin-bottom: 10px; font-size: 10px; color: var(--neon-blue); text-align: center;">
                <button onclick="copyLink()" style="width:100%; background:var(--neon-blue); border:none; padding:10px; font-weight:bold; cursor:pointer; border-radius: 5px; color: #000;">COPIAR ENLACE</button>
            </div>
        </div>
    </div>

    <div id="ui-player">
        <div id="overlay-bg"></div>
        <button id="btn-back" onclick="closeVideo()">Regresar al Menú</button>
        <div id="content-wrapper">
            <div class="tabs-audio">
                <div class="tab-btn" id="btn-lat" onclick="switchAudio('lat')"><img src="https://flagcdn.com/w80/mx.png"><span>Latino</span></div>
                <div class="tab-btn" id="btn-jap" onclick="switchAudio('jap')"><img src="https://flagcdn.com/w80/jp.png"><span>Japonés</span></div>
                <div class="tab-btn" id="btn-cas" onclick="switchAudio('cas')"><img src="https://flagcdn.com/w80/es.png"><span>Español</span></div>
                <div class="tab-btn" id="btn-ing" onclick="switchAudio('ing')"><img src="https://flagcdn.com/w80/us.png"><span>Inglés</span></div>
            </div>
            <div id="list-lat" class="server-list"></div>
            <div id="list-jap" class="server-list"></div>
            <div id="list-cas" class="server-list"></div>
            <div id="list-ing" class="server-list"></div>
        </div>
        <div id="video-container">
            <iframe id="main-ifr" src="" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
        </div>
    </div>

<script>
    const q = new URLSearchParams(window.location.search);
    const v = q.get('v');

    if (v) {
        document.getElementById('ui-generator').style.display = 'none';
        document.getElementById('ui-player').style.display = 'flex';
        
        try {
            const decodedData = decodeURIComponent(escape(atob(v)));
            const data = JSON.parse(decodedData);

            if (data.bg) document.getElementById('ui-player').style.backgroundImage = `url('${data.bg}')`;
            
            const order = ['lat', 'jap', 'cas', 'ing'];
            const names = ['LATINO', 'JAPONÉS', 'CASTELLANO', 'INGLÉS'];
            let first = null;

            order.forEach((l, i) => {
                if (data[l]) {
                    const links = data[l].filter(u => u && u.trim() !== "");
                    if (links.length > 0) {
                        const list = document.getElementById(`list-${l}`);
                        links.forEach((url, idx) => {
                            const item = document.createElement('div');
                            item.className = 'server-item';
                            item.onclick = () => {
                                document.getElementById('main-ifr').src = url;
                                document.getElementById('video-container').classList.add('active');
                                document.getElementById('btn-back').style.display = 'block';
                            };
                            item.innerHTML = `<div class="play-icon">▶</div><div class="server-info"><h4>OPCIÓN ${idx+1}</h4><p>SERVIDOR | ${names[i]}</p></div>`;
                            list.appendChild(item);
                        });
                        document.getElementById(`btn-${l}`).style.display = 'block';
                        if (!first) first = l;
                    }
                }
            });
            if (first) switchAudio(first);
        } catch(e) { console.error(e); }
    }

    function switchAudio(lang) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.server-list').forEach(l => l.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        document.getElementById('list-' + lang).classList.add('active');
    }

    function buildLink() {
        const getVals = cls => Array.from(document.querySelectorAll(cls)).map(i => i.value.trim());
        const data = {
            lat: getVals('.lat-in'),
            jap: getVals('.jap-in'),
            cas: getVals('.cas-in'),
            ing: getVals('.ing-in'),
            bg: document.getElementById('bg-in').value
        };
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        document.getElementById('out-url').value = window.location.origin + window.location.pathname + "?v=" + encoded;
        document.getElementById('box-link').style.display = 'block';
    }

    function copyLink() {
        const inp = document.getElementById('out-url');
        inp.select();
        document.execCommand("copy");
        alert("Enlace copiado correctamente.");
    }

    function closeVideo() {
        document.getElementById('video-container').classList.remove('active');
        document.getElementById('btn-back').style.display = 'none';
        document.getElementById('main-ifr').src = '';
    }
</script>    
<script src="https://pl28936701.effectivegatecpm.com/dc/c5/33/dcc53393bbdb6904db41d73cae7f5a24.js"></script>
</body>
</html>
