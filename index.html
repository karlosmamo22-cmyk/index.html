<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA MULTI-AUDIO PRO | Editor</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --bg-dark: #000000;
            --card-bg: rgba(10, 10, 12, 0.98);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: #fff; font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* CAPA 1: GENERADOR */
        #ui-generator {
            display: none; /* Se activa solo por JS si no hay video */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #050505;
            padding: 10px;
            box-sizing: border-box;
        }

        /* CAPA 2: REPRODUCTOR (EL ESCUDO) */
        #ui-player {
            display: none; 
            position: fixed; /* Ocupa toda la pantalla sobre todo lo demás */
            top: 0; left: 0;
            width: 100%; height: 100vh;
            justify-content: center; align-items: center;
            background-color: #000; /* Fondo negro sólido para evitar parpadeos */
            background-size: cover; background-position: center;
            z-index: 9999;
        }

        .card { 
            background: #000; padding: 12px; border-radius: 12px; border: 1px solid #1a1a1a; 
            width: 100%; max-width: 500px; height: 92vh; 
            display: flex; flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }
        
        .main-title { text-align: center; color: var(--neon-blue); margin: 0 0 10px 0; font-size: 18px; font-weight: 900; text-transform: uppercase; }
        .import-box { background: #0a0a0a; padding: 8px; border-radius: 8px; margin-bottom: 10px; border: 1px dashed #333; }
        #inputs-scroll-area { overflow-y: auto; flex: 1; padding-right: 5px; margin-bottom: 10px; }
        .section-group { margin-bottom: 8px; background: #080808; padding: 8px; border-radius: 8px; border: 1px solid #111; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .section-label { color: var(--neon-blue); font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .btn-add { background: var(--neon-blue); border: none; color: #000; border-radius: 4px; padding: 2px 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .input-list { display: flex; flex-direction: column; gap: 4px; }
        .input-row { display: flex; gap: 4px; }
        .btn-del { background: #ff3333; border: none; color: white; border-radius: 4px; padding: 0 8px; cursor: pointer; }
        input { flex: 1; padding: 10px; background: #000; border: 1px solid #222; border-radius: 5px; color: #fff; font-size: 11px; outline: none; }
        input:focus { border-color: var(--neon-blue); }
        .btn-main { width: 100%; padding: 14px; background: var(--neon-blue); border: none; font-weight: 900; border-radius: 6px; cursor: pointer; text-transform: uppercase; font-size: 12px; color: #000; margin-top: 10px; }
        #box-link { display:none; margin-top:10px; border:1px solid var(--neon-blue); padding:10px; background: #00151a; border-radius: 8px; }

        /* --- PLAYER UI --- */
        #overlay-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.9) 100%); z-index: 1; }
        #content-wrapper { z-index: 10; width: 95%; max-width: 800px; text-align: center; }
        .tabs-audio { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap; }
        .tab-btn { cursor: pointer; text-align: center; opacity: 0.4; transition: 0.3s; display: none; }
        .tab-btn.active { opacity: 1; transform: scale(1.1); }
        .tab-btn img { width: 35px; height: 22px; border-radius: 3px; display: block; margin: 0 auto 4px; }
        .tab-btn span { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #fff; }
        .server-list { display: none; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; max-height: 60vh; overflow-y: auto; padding: 5px; }
        .server-list.active { display: grid; }
        .server-item { background: var(--card-bg); border-radius: 6px; padding: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        
        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; visibility: hidden; z-index: 10000; background: #000; }
        #video-container.active { opacity: 1; visibility: visible; }
        iframe { width: 100%; height: 100%; border: none; }
        
        #btn-back { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8); color: var(--neon-blue); border: 1px solid var(--neon-blue); width: 40px; height: 40px; border-radius: 50%; z-index: 10001; display: none; align-items: center; justify-content: center; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="ui-generator">
        <div class="card">
            <h2 class="main-title">SISTEMA MULTI-AUDIO PRO</h2>
            <div class="import-box">
                <span class="section-label">Editar link anterior</span>
                <input type="text" id="import-url" placeholder="Pega el link aquí...">
                <button onclick="importData()" style="width:100%; background:#111; color:var(--neon-blue); border:1px solid #222; padding:6px; border-radius:4px; font-size:9px; cursor:pointer; margin-top:4px; font-weight:bold;">CARGAR DATOS</button>
            </div>
            <div id="inputs-scroll-area">
                <div class="section-group">
                    <div class="section-header"><span class="section-label">🇯🇵 Japonés</span><button class="btn-add" onclick="addInput('jap')">+</button></div>
                    <div id="cont-jap" class="input-list"></div>
                </div>
                <div class="section-group">
                    <div class="section-header"><span class="section-label">🇲🇽 Latino</span><button class="btn-add" onclick="addInput('lat')">+</button></div>
                    <div id="cont-lat" class="input-list"></div>
                </div>
                <div class="section-group">
                    <div class="section-header"><span class="section-label">🇪🇸 Castellano</span><button class="btn-add" onclick="addInput('cas')">+</button></div>
                    <div id="cont-cas" class="input-list"></div>
                </div>
                <div class="section-group">
                    <div class="section-header"><span class="section-label">🇺🇸 Inglés</span><button class="btn-add" onclick="addInput('ing')">+</button></div>
                    <div id="cont-ing" class="input-list"></div>
                </div>
                <div class="section-group">
                    <span class="section-label" style="display:block; margin-bottom:4px;">Fondo (URL)</span>
                    <input type="text" id="bg-in" placeholder="URL Imagen de fondo" style="width:100%;">
                </div>
                <button class="btn-main" onclick="buildLink()">GENERAR ENLACE ACTUALIZADO</button>
                <div id="box-link">
                    <input type="text" id="out-url" readonly style="margin-bottom:8px; font-size:10px; color:var(--neon-blue); text-align:center; width:100%; background:transparent; border:1px solid var(--neon-blue);">
                    <button onclick="copyLink()" style="width:100%; background:var(--neon-blue); border:none; padding:12px; font-weight:bold; border-radius:4px; color:#000; font-size:11px; cursor:pointer;">COPIAR NUEVO LINK</button>
                </div>
            </div>
        </div>
    </div>

    <div id="ui-player">
        <div id="overlay-bg"></div>
        <button id="btn-back" onclick="closeVideo()">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </button>
        <div id="content-wrapper">
            <div class="tabs-audio">
                <div class="tab-btn" id="btn-jap" onclick="switchAudio('jap')"><img src="https://flagcdn.com/w80/jp.png"><span>Japonés</span></div>
                <div class="tab-btn" id="btn-lat" onclick="switchAudio('lat')"><img src="https://flagcdn.com/w80/mx.png"><span>Latino</span></div>
                <div class="tab-btn" id="btn-cas" onclick="switchAudio('cas')"><img src="https://flagcdn.com/w80/es.png"><span>Español</span></div>
                <div class="tab-btn" id="btn-ing" onclick="switchAudio('ing')"><img src="https://flagcdn.com/w80/us.png"><span>Inglés</span></div>
            </div>
            <div id="list-jap" class="server-list"></div>
            <div id="list-lat" class="server-list"></div>
            <div id="list-cas" class="server-list"></div>
            <div id="list-ing" class="server-list"></div>
        </div>
        <div id="video-container">
            <iframe id="main-ifr" src="" allowfullscreen allow="autoplay; fullscreen"></iframe>
        </div>
    </div>

<script>
    // Lógica de inicio crítico para evitar el parpadeo
    const params = new URLSearchParams(window.location.search);
    const dataVer = params.get('v');
    const generator = document.getElementById('ui-generator');
    const player = document.getElementById('ui-player');

    if (dataVer) {
        // MODO PLAYER: Ocultamos generador y mostramos player instantáneamente
        generator.style.display = 'none';
        player.style.display = 'flex';
        loadPlayerData(dataVer);
    } else {
        // MODO EDITOR
        generator.style.display = 'flex';
        player.style.display = 'none';
        ['jap', 'lat', 'cas', 'ing'].forEach(l => addInput(l, "", false));
    }

    function loadPlayerData(base64) {
        try {
            const data = JSON.parse(decodeURIComponent(escape(atob(base64))));
            if (data.bg) player.style.backgroundImage = `url('${data.bg}')`;
            
            let firstAudio = null;
            ['jap', 'lat', 'cas', 'ing'].forEach(l => {
                if (data[l] && data[l].length > 0) {
                    const links = data[l].filter(u => u && u.trim() !== "");
                    if (links.length > 0) {
                        const list = document.getElementById(`list-${l}`);
                        links.forEach((url, idx) => {
                            const item = document.createElement('div');
                            item.className = 'server-item';
                            item.onclick = () => {
                                document.getElementById('main-ifr').src = url;
                                document.getElementById('video-container').classList.add('active');
                                document.getElementById('btn-back').style.display = 'flex';
                            };
                            item.innerHTML = `<span style="color:var(--neon-blue)">▶</span> <span style="font-size:12px">OPCIÓN ${idx+1}</span>`;
                            list.appendChild(item);
                        });
                        document.getElementById(`btn-${l}`).style.display = 'block';
                        if (!firstAudio) firstAudio = l;
                    }
                }
            });
            if (firstAudio) switchAudio(firstAudio);
        } catch(e) { console.error("Error loading data"); }
    }

    function addInput(lang, value = "", scroll = true) {
        const cont = document.getElementById(`cont-${lang}`);
        const count = cont.querySelectorAll('.input-row').length;
        const div = document.createElement('div');
        div.className = 'input-row';
        div.innerHTML = `<input type="text" class="${lang}-in" placeholder="Link" value="${value}">${count > 0 ? `<button class="btn-del" onclick="this.parentElement.remove()">×</button>` : ''}`;
        cont.appendChild(div);
        if(scroll) {
            const area = document.getElementById('inputs-scroll-area');
            area.scrollTop = area.scrollHeight;
        }
    }

    function switchAudio(lang) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.server-list').forEach(l => l.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        document.getElementById('list-' + lang).classList.add('active');
    }

    function buildLink() {
        const getVals = cls => Array.from(document.querySelectorAll(cls)).map(i => i.value.trim()).filter(v => v !== "");
        const data = { jap: getVals('.jap-in'), lat: getVals('.lat-in'), cas: getVals('.cas-in'), ing: getVals('.ing-in'), bg: document.getElementById('bg-in').value };
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        document.getElementById('out-url').value = window.location.origin + window.location.pathname + "?v=" + encoded;
        document.getElementById('box-link').style.display = 'block';
    }

    function copyLink() {
        const inp = document.getElementById('out-url');
        inp.select();
        document.execCommand("copy");
        alert("¡Link copiado!");
    }

    function closeVideo() {
        document.getElementById('video-container').classList.remove('active');
        document.getElementById('btn-back').style.display = 'none';
        document.getElementById('main-ifr').src = '';
    }

    function importData() {
        const val = document.getElementById('import-url').value;
        try {
            const url = new URL(val);
            const v = url.searchParams.get('v');
            if (v) {
                const data = JSON.parse(decodeURIComponent(escape(atob(v))));
                ['jap', 'lat', 'cas', 'ing'].forEach(l => document.getElementById(`cont-${l}`).innerHTML = "");
                ['jap', 'lat', 'cas', 'ing'].forEach(l => { if(data[l]) data[l].forEach(val => addInput(l, val, false)); else addInput(l, "", false); });
                if (data.bg) document.getElementById('bg-in').value = data.bg;
            }
        } catch(e) { alert("Error al importar"); }
    }
</script>
<script src="https://pl28958343.profitablecpmratenetwork.com/d0/6f/87/d06f8769b5c158e55dd4056411ea4d29.js"></script>
</body>
</html>
