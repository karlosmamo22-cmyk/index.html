<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Multi-Player Mini Pro</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --bg-dark: #000000;
            --card-bg: rgba(15, 16, 20, 0.95);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* --- GENERADOR (PANEL DE CONTROL) --- */
        #ui-generator {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #111;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: #000;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 { color: var(--neon-blue); margin-bottom: 15px; font-size: 1.2rem; }
        
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: #0a0a0a;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            box-sizing: border-box;
            outline: none;
            font-size: 13px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-main {
            padding: 12px;
            background: var(--neon-blue);
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
        }

        .btn-clear {
            padding: 12px;
            background: #222;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        #box-link {
            display: none;
            margin-top: 15px;
            padding: 10px;
            background: #050505;
            border-radius: 8px;
            border: 1px dashed var(--neon-blue);
        }

        .copy-area { display: flex; gap: 5px; }
        .btn-copy { background: var(--neon-blue); border: none; padding: 5px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; }

        /* --- PLAYER (EL RESULTADO) --- */
        #ui-player {
            display: none;
            width: 100%;
            height: 100vh;
            justify-content: center;
            align-items: center;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        #overlay-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1;
        }

        /* Contenedor de opciones con Scroll si hay muchas */
        #menu-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 95%;
            max-width: 420px;
            z-index: 10;
            max-height: 85vh;
            overflow-y: auto;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Tarjetas mucho más pequeñas */
        .server-card {
            background: var(--card-bg);
            border: 1.5px solid var(--neon-blue);
            border-radius: 8px;
            padding: 10px 10px;
            cursor: pointer;
            text-align: center;
            position: relative;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 30px;
        }

        .server-card:hover { transform: scale(1.03); background: rgba(0, 212, 255, 0.1); }

        .card-num {
            position: absolute;
            top: 5px; left: 8px;
            font-size: 10px;
            font-weight: bold;
            color: var(--neon-blue);
        }

        .card-name {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #fff;
            text-transform: uppercase;
        }

        /* Video Area */
        #video-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; visibility: hidden;
            z-index: 100;
            background: #000;
        }

        #video-container.active { opacity: 1; visibility: visible; }
        iframe { width: 100%; height: 100%; border: none; }

        #btn-back {
            position: absolute;
            top: 10px; right: 10px;
            background: rgba(255,255,255,0.2);
            color: #fff; border: none;
            padding: 6px 12px; border-radius: 4px;
            cursor: pointer; z-index: 200; display: none;
            font-size: 11px;
        }

        /* Ocultar scrollbar */
        #menu-selector::-webkit-scrollbar { width: 4px; }
        #menu-selector::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }

        @media (max-width: 380px) {
            #menu-selector { grid-template-columns: 1fr; }
            .server-card { min-height: 40px; padding: 12px 10px; }
        }
    </style>
</head>
<body>

    <!-- GENERADOR -->
    <div id="ui-generator">
        <div class="card">
            <h2>Panel Pro Compact</h2>
            <div id="inputs-area">
                <input type="text" class="link-in" placeholder="Enlace Servidor 1">
                <input type="text" class="link-in" placeholder="Enlace Servidor 2">
                <input type="text" class="link-in" placeholder="Enlace Servidor 3">
                <input type="text" class="link-in" placeholder="Enlace Servidor 4">
                <input type="text" class="link-in" placeholder="Enlace Servidor 5">
                <input type="text" class="link-in" placeholder="Enlace Servidor 6">
                <input type="text" class="link-in" placeholder="Enlace Servidor 7">
                <input type="text" class="link-in" placeholder="Enlace Servidor 8">
                <p style="font-size: 11px; color: #777; margin: 10px 0 5px;">Fondo de Pantalla (URL):</p>
                <input type="text" id="bg-img-in" placeholder="URL de la Imagen">
            </div>
            
            <div class="btn-group">
                <button class="btn-main" onclick="build()">Generar Link</button>
                <button class="btn-clear" onclick="location.reload()">Limpiar</button>
            </div>

            <div id="box-link">
                <div class="copy-area">
                    <input type="text" id="out-url" readonly style="font-size: 10px;">
                    <button class="btn-copy" id="btn-copy-action" onclick="copyLink()">Copiar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PLAYER -->
    <div id="ui-player">
        <div id="overlay-bg"></div>
        <button id="btn-back" onclick="closeVideo()">Regresar</button>
        <div id="menu-selector"></div>
        
        <div id="video-container">
            <iframe id="main-ifr" src="" allowfullscreen></iframe>
        </div>
    </div>

<script>
    const q = new URLSearchParams(window.location.search);
    const dataEncoded = q.get('v');

    if (dataEncoded) {
        document.getElementById('ui-generator').style.display = 'none';
        document.getElementById('ui-player').style.display = 'flex';
        
        try {
            const decoded = JSON.parse(atob(dataEncoded));
            const selector = document.getElementById('menu-selector');
            
            if (decoded.bg) {
                document.getElementById('ui-player').style.backgroundImage = `url('${decoded.bg}')`;
            }

            decoded.links.forEach((url, i) => {
                if (url && url.trim() !== "") {
                    const card = document.createElement('div');
                    card.className = 'server-card';
                    card.onclick = () => openVideo(url);
                    
                    card.innerHTML = `
                        <div class="card-num">S${i+1}</div>
                        <div class="card-name">OPCIÓN ${i+1}</div>
                    `;
                    selector.appendChild(card);
                }
            });
        } catch(e) { console.error("Error loading data"); }
    }

    function build() {
        const inputs = document.querySelectorAll('.link-in');
        const bg = document.getElementById('bg-img-in').value;
        const links = Array.from(inputs).map(i => i.value).filter(v => v !== "");

        if (links.length === 0) return alert("Ingresa al menos un link");

        const data = btoa(JSON.stringify({ links, bg }));
        const base = window.location.href.split('?')[0];
        
        document.getElementById('out-url').value = `${base}?v=${data}`;
        document.getElementById('box-link').style.display = 'block';
    }

    function copyLink() {
        const out = document.getElementById('out-url');
        out.select();
        document.execCommand("copy");
        document.getElementById('btn-copy-action').innerText = "Copiado";
    }

    function openVideo(url) {
        const ifr = document.getElementById('main-ifr');
        const cont = document.getElementById('video-container');
        const btn = document.getElementById('btn-back');
        
        ifr.src = url;
        cont.classList.add('active');
        btn.style.display = 'block';
    }

    function closeVideo() {
        const ifr = document.getElementById('main-ifr');
        const cont = document.getElementById('video-container');
        const btn = document.getElementById('btn-back');
        
        cont.classList.remove('active');
        btn.style.display = 'none';
        ifr.src = '';
    }
</script>

</body>
</html>
