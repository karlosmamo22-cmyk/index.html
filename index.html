<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Audio Player Pro</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --bg-dark: #000000;
            --card-bg: rgba(20, 22, 28, 0.9);
            --item-hover: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* --- GENERADOR --- */
        #ui-generator {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background: #111; overflow-y: auto; padding: 20px; box-sizing: border-box;
        }
        .card { background: #000; padding: 25px; border-radius: 15px; border: 1px solid #333; width: 100%; max-width: 450px; }
        .section-label { color: var(--neon-blue); font-size: 12px; font-weight: bold; margin: 10px 0 5px; display: block; text-transform: uppercase; }
        input { width: 100%; padding: 10px; margin-bottom: 5px; background: #0a0a0a; border: 1px solid #444; border-radius: 6px; color: #fff; box-sizing: border-box; font-size: 13px; }
        .btn-main { width: 100%; padding: 15px; background: var(--neon-blue); border: none; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 15px; text-transform: uppercase; }

        /* --- PLAYER --- */
        #ui-player {
            display: none; width: 100%; height: 100vh;
            justify-content: center; align-items: center;
            position: relative; background-size: cover; background-position: center;
        }
        #overlay-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1; }

        #content-wrapper { z-index: 10; width: 95%; max-width: 450px; }

        .tabs-audio {
            display: flex; gap: 15px; margin-bottom: 20px; justify-content: flex-start; overflow-x: auto; padding-bottom: 10px;
        }
        .tab-btn {
            cursor: pointer; text-align: center; opacity: 0.5; transition: 0.3s; min-width: 60px;
        }
        .tab-btn.active { opacity: 1; transform: scale(1.1); }
        .tab-btn img { width: 35px; height: 25px; border-radius: 4px; display: block; margin: 0 auto 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .tab-btn span { font-size: 11px; font-weight: bold; display: block; }

        .server-list { display: none; flex-direction: column; gap: 10px; max-height: 60vh; overflow-y: auto; }
        .server-list.active { display: flex; }

        .server-item {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 12px 15px;
            display: flex; align-items: center;
            gap: 15px; cursor: pointer;
            transition: 0.2s; border: 1px solid rgba(255,255,255,0.05);
        }
        .server-item:hover { background: var(--item-hover); border-color: var(--neon-blue); }
        .play-icon { color: var(--neon-blue); font-size: 20px; }
        .server-info h4 { margin: 0; font-size: 14px; letter-spacing: 0.5px; }
        .server-info p { margin: 0; font-size: 11px; color: #888; text-transform: uppercase; }

        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; visibility: hidden; z-index: 100; background: #000; }
        #video-container.active { opacity: 1; visibility: visible; }
        #btn-back { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.2); color: #fff; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; z-index: 200; display: none; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="ui-generator">
        <div class="card">
            <h2 style="text-align:center; color:var(--neon-blue); margin-top:0;">Generador Multi-Audio</h2>
            
            <div style="max-height: 450px; overflow-y: auto; padding-right: 5px;">
                <span class="section-label">🇲🇽 Latino</span>
                <input type="text" class="lat-in" placeholder="URL Servidor 1">
                <input type="text" class="lat-in" placeholder="URL Servidor 2">
                
                <span class="section-label">🇪🇸 Castellano</span>
                <input type="text" class="cas-in" placeholder="URL Servidor 1">
                <input type="text" class="cas-in" placeholder="URL Servidor 2">

                <span class="section-label">🇯🇵 Japonés</span>
                <input type="text" class="jap-in" placeholder="URL Servidor 1">
                <input type="text" class="jap-in" placeholder="URL Servidor 2">

                <span class="section-label">🇺🇸 Inglés</span>
                <input type="text" class="ing-in" placeholder="URL Servidor 1">
                <input type="text" class="ing-in" placeholder="URL Servidor 2">
                
                <span class="section-label">Configuración</span>
                <input type="text" id="bg-in" placeholder="URL Imagen de Fondo">
            </div>
            
            <button class="btn-main" onclick="build()">Generar Enlace Profesional</button>
            
            <div id="box-link" style="display:none; margin-top:15px; border:1px dashed var(--neon-blue); padding:10px;">
                <input type="text" id="out-url" readonly style="font-size:10px;">
                <button onclick="copyLink()" style="width:100%; background:var(--neon-blue); border:none; padding:5px; margin-top:5px; font-weight:bold; cursor:pointer;">COPIAR LINK</button>
            </div>
        </div>
    </div>

    <div id="ui-player">
        <div id="overlay-bg"></div>
        <button id="btn-back" onclick="closeVideo()">Regresar al Menú</button>
        
        <div id="content-wrapper">
            <div class="tabs-audio">
                <div class="tab-btn" id="btn-lat" onclick="switchAudio('lat')">
                    <img src="https://flagcdn.com/w80/mx.png"><span>Latino</span>
                </div>
                <div class="tab-btn" id="btn-cas" onclick="switchAudio('cas')">
                    <img src="https://flagcdn.com/w80/es.png"><span>Español</span>
                </div>
                <div class="tab-btn" id="btn-jap" onclick="switchAudio('jap')">
                    <img src="https://flagcdn.com/w80/jp.png"><span>Japonés</span>
                </div>
                <div class="tab-btn" id="btn-ing" onclick="switchAudio('ing')">
                    <img src="https://flagcdn.com/w80/us.png"><span>Inglés</span>
                </div>
            </div>

            <div id="list-lat" class="server-list"></div>
            <div id="list-cas" class="server-list"></div>
            <div id="list-jap" class="server-list"></div>
            <div id="list-ing" class="server-list"></div>
        </div>

        <div id="video-container">
            <iframe id="main-ifr" src="" allowfullscreen></iframe>
        </div>
    </div>

<script>
    const q = new URLSearchParams(window.location.search);
    const v = q.get('v');

    if (v) {
        document.getElementById('ui-generator').style.display = 'none';
        document.getElementById('ui-player').style.display = 'flex';
        const data = JSON.parse(atob(v));

        if (data.bg) document.getElementById('ui-player').style.backgroundImage = `url('${data.bg}')`;

        const langs = ['lat', 'cas', 'jap', 'ing'];
        const labels = ['LATINO', 'CASTELLANO', 'JAPONÉS', 'INGLÉS'];
        let firstActive = null;

        langs.forEach((lang, index) => {
            if (data[lang] && data[lang].some(url => url.trim() !== "")) {
                renderList(data[lang], `list-${lang}`, labels[index]);
                if (!firstActive) firstActive = lang;
            } else {
                document.getElementById(`btn-${lang}`).style.display = 'none';
            }
        });

        if (firstActive) switchAudio(firstActive);
    }

    function renderList(links, targetId, subText) {
        const container = document.getElementById(targetId);
        links.forEach((url, i) => {
            if (!url || url.trim() === "") return;
            const item = document.createElement('div');
            item.className = 'server-item';
            item.onclick = () => {
                document.getElementById('main-ifr').src = url;
                document.getElementById('video-container').classList.add('active');
                document.getElementById('btn-back').style.display = 'block';
            };
            item.innerHTML = `
                <div class="play-icon">▶</div>
                <div class="server-info">
                    <h4>OPCIÓN ${i+1}</h4>
                    <p>SERVIDOR | ${subText}</p>
                </div>
            `;
            container.appendChild(item);
        });
    }

    function switchAudio(lang) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.server-list').forEach(l => l.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        document.getElementById('list-' + lang).classList.add('active');
    }

    function build() {
        const getVals = (cls) => Array.from(document.querySelectorAll(cls)).map(i => i.value);
        const data = {
            lat: getVals('.lat-in'),
            cas: getVals('.cas-in'),
            jap: getVals('.jap-in'),
            ing: getVals('.ing-in'),
            bg: document.getElementById('bg-in').value
        };
        const encoded = btoa(JSON.stringify(data));
        document.getElementById('out-url').value = `${window.location.href.split('?')[0]}?v=${encoded}`;
        document.getElementById('box-link').style.display = 'block';
    }

    function copyLink() {
        const out = document.getElementById('out-url');
        out.select(); document.execCommand("copy");
    }

    function closeVideo() {
        document.getElementById('video-container').classList.remove('active');
        document.getElementById('btn-back').style.display = 'none';
        document.getElementById('main-ifr').src = '';
    }
</script>
</body>
</html>
