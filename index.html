<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Player Pro | Controles Nativos</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --bg-dark: #000000;
            --card-bg: rgba(10, 10, 12, 0.98);
            --item-hover: rgba(0, 212, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: #fff; font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* --- GENERADOR ULTRA COMPACTO --- */
        #ui-generator {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #050505;
            padding: 10px;
            box-sizing: border-box;
        }
        .card { 
            background: #000; padding: 15px; border-radius: 12px; border: 1px solid #1a1a1a; 
            width: 100%; max-width: 500px;
            display: flex; flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }
        
        .main-title {
            text-align: center; color: var(--neon-blue); 
            margin: 0 0 15px 0; font-size: 20px; 
            font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase;
        }

        .section-group { margin-bottom: 8px; background: #080808; padding: 8px; border-radius: 8px; border: 1px solid #111; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .section-label { color: var(--neon-blue); font-size: 10px; font-weight: 800; text-transform: uppercase; }
        
        .btn-add { background: var(--neon-blue); border: none; color: #000; border-radius: 4px; padding: 2px 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .input-list { display: flex; flex-direction: column; gap: 4px; }
        .input-row { display: flex; gap: 4px; }
        .btn-del { background: #ff3333; border: none; color: white; border-radius: 4px; padding: 0 8px; cursor: pointer; }

        input { 
            flex: 1; padding: 8px 10px; background: #000; border: 1px solid #222; 
            border-radius: 5px; color: #fff; font-size: 12px; outline: none; 
        }
        input:focus { border-color: var(--neon-blue); }

        .btn-main { 
            width: 100%; padding: 12px; background: var(--neon-blue); border: none; 
            font-weight: 800; border-radius: 6px; cursor: pointer; margin-top: 8px; 
            text-transform: uppercase; font-size: 12px; color: #000;
        }

        /* --- PLAYER --- */
        #ui-player {
            display: none; width: 100%; height: 100vh;
            justify-content: center; align-items: center;
            position: relative; background-size: cover; background-position: center;
        }
        #overlay-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.95) 100%); z-index: 1; }
        #content-wrapper { z-index: 10; width: 95%; max-width: 800px; text-align: center; }

        .tabs-audio { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap; }
        .tab-btn { cursor: pointer; text-align: center; opacity: 0.4; transition: 0.3s; display: none; }
        .tab-btn.active { opacity: 1; transform: scale(1.1); }
        .tab-btn img { width: 35px; height: 22px; border-radius: 3px; display: block; margin: 0 auto 4px; }
        .tab-btn span { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #fff; }

        .server-list { 
            display: none; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 10px; max-height: 60vh; overflow-y: auto; padding: 5px;
        }
        .server-list.active { display: grid; }
        .server-item { background: var(--card-bg); border-radius: 6px; padding: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        
        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; visibility: hidden; z-index: 100; background: #000; }
        #video-container.active { opacity: 1; visibility: visible; }
        iframe { width: 100%; height: 100%; border: none; }

        #btn-back { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.7); color: var(--neon-blue); border: 1px solid var(--neon-blue); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 200; display: none; align-items: center; justify-content: center; }

        #box-link { display:none; margin-top:10px; border:1px solid #222; padding:8px; background: #050505; border-radius: 8px; }

        @media (max-width: 600px) {
            .main-title { font-size: 18px; margin-bottom: 10px; }
            .section-group { padding: 6px; margin-bottom: 5px; }
            input { padding: 6px 8px; font-size: 11px; }
            .btn-main { padding: 10px; font-size: 11px; }
            .server-list { grid-template-columns: 1fr; }
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); }
    </style>
</head>
<body>

    <div id="ui-generator">
        <div class="card">
            <h2 class="main-title">SISTEMA MULTI-AUDIO PRO</h2>
            
            <div id="main-form-area">
                <div class="section-group">
                    <div class="section-header"><span class="section-label">🇯🇵 Japonés</span><button class="btn-add" onclick="addInput('jap')">+</button></div>
                    <div id="cont-jap" class="input-list"><input type="text" class="jap-in" placeholder="Link"></div>
                </div>
                <div class="section-group">
                    <div class="section-header"><span class="section-label">🇲🇽 Latino</span><button class="btn-add" onclick="addInput('lat')">+</button></div>
                    <div id="cont-lat" class="input-list"><input type="text" class="lat-in" placeholder="Link"></div>
                </div>
                <div class="section-group">
                    <div class="section-header"><span class="section-label">🇪🇸 Castellano</span><button class="btn-add" onclick="addInput('cas')">+</button></div>
                    <div id="cont-cas" class="input-list"><input type="text" class="cas-in" placeholder="Link"></div>
                </div>
                <div class="section-group">
                    <div class="section-header"><span class="section-label">🇺🇸 Inglés</span><button class="btn-add" onclick="addInput('ing')">+</button></div>
                    <div id="cont-ing" class="input-list"><input type="text" class="ing-in" placeholder="Link"></div>
                </div>
                <div class="section-group" style="margin-bottom: 0;">
                    <span class="section-label" style="display:block; margin-bottom: 4px;">Fondo (URL)</span>
                    <input type="text" id="bg-in" placeholder="URL Imagen" style="width: 100%; box-sizing: border-box;">
                </div>
            </div>
            
            <button class="btn-main" onclick="buildLink()">GENERAR ENLACE</button>
            <div id="box-link">
                <input type="text" id="out-url" readonly style="margin-bottom: 5px; font-size: 9px; color: var(--neon-blue); text-align: center; width: 100%; box-sizing: border-box;">
                <button onclick="copyLink()" style="width:100%; background:var(--neon-blue); border:none; padding: 8px; font-weight:bold; border-radius: 4px; color: #000; font-size: 10px; cursor:pointer;">COPIAR</button>
            </div>
        </div>
    </div>

    <div id="ui-player">
        <div id="overlay-bg"></div>
        <button id="btn-back" onclick="closeVideo()">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </button>
        <div id="content-wrapper">
            <div class="tabs-audio">
                <div class="tab-btn" id="btn-jap" onclick="switchAudio('jap')"><img src="https://flagcdn.com/w80/jp.png"><span>Japonés</span></div>
                <div class="tab-btn" id="btn-lat" onclick="switchAudio('lat')"><img src="https://flagcdn.com/w80/mx.png"><span>Latino</span></div>
                <div class="tab-btn" id="btn-cas" onclick="switchAudio('cas')"><img src="https://flagcdn.com/w80/es.png"><span>Español</span></div>
                <div class="tab-btn" id="btn-ing" onclick="switchAudio('ing')"><img src="https://flagcdn.com/w80/us.png"><span>Inglés</span></div>
            </div>
            <div id="list-jap" class="server-list"></div>
            <div id="list-lat" class="server-list"></div>
            <div id="list-cas" class="server-list"></div>
            <div id="list-ing" class="server-list"></div>
        </div>
        <div id="video-container">
            <iframe id="main-ifr" src="" allowfullscreen allow="autoplay; fullscreen"></iframe>
        </div>
    </div>

<script>
    let idleTimer;
    function startIdleTimer() {
        const btn = document.getElementById('btn-back');
        btn.style.opacity = "1";
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => { btn.style.opacity = "0.4"; }, 5000); 
    }

    function addInput(lang) {
        const container = document.getElementById(`cont-${lang}`);
        if(container.children.length >= 3) return; // Límite para mantener todo en pantalla
        const div = document.createElement('div');
        div.className = 'input-row';
        div.innerHTML = `<input type="text" class="${lang}-in" placeholder="Link"><button class="btn-del" onclick="this.parentElement.remove()">×</button>`;
        container.appendChild(div);
    }

    const q = new URLSearchParams(window.location.search);
    const v = q.get('v');

    if (v) {
        document.getElementById('ui-generator').style.display = 'none';
        document.getElementById('ui-player').style.display = 'flex';
        try {
            const data = JSON.parse(decodeURIComponent(escape(atob(v))));
            if (data.bg) document.getElementById('ui-player').style.backgroundImage = `url('${data.bg}')`;
            const order = ['jap', 'lat', 'cas', 'ing'];
            let first = null;
            order.forEach((l) => {
                if (data[l]) {
                    const links = data[l].filter(u => u && u.trim() !== "");
                    if (links.length > 0) {
                        const list = document.getElementById(`list-${l}`);
                        links.forEach((url, idx) => {
                            const item = document.createElement('div');
                            item.className = 'server-item';
                            item.onclick = () => {
                                document.getElementById('main-ifr').src = url;
                                document.getElementById('video-container').classList.add('active');
                                document.getElementById('btn-back').style.display = 'flex';
                                startIdleTimer();
                            };
                            item.innerHTML = `<span style="color:var(--neon-blue)">▶</span> <span style="font-size:12px">OPCIÓN ${idx+1}</span>`;
                            list.appendChild(item);
                        });
                        document.getElementById(`btn-${l}`).style.display = 'block';
                        if (!first) first = l;
                    }
                }
            });
            if (first) switchAudio(first);
        } catch(e) {}
    } else {
        document.getElementById('ui-generator').style.display = 'flex';
    }

    function switchAudio(lang) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.server-list').forEach(l => l.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        document.getElementById('list-' + lang).classList.add('active');
    }

    function buildLink() {
        const getVals = cls => Array.from(document.querySelectorAll(cls)).map(i => i.value.trim());
        const data = { jap: getVals('.jap-in'), lat: getVals('.lat-in'), cas: getVals('.cas-in'), ing: getVals('.ing-in'), bg: document.getElementById('bg-in').value };
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        document.getElementById('out-url').value = window.location.origin + window.location.pathname + "?v=" + encoded;
        document.getElementById('box-link').style.display = 'block';
    }

    function copyLink() {
        const inp = document.getElementById('out-url');
        inp.select();
        document.execCommand("copy");
    }

    function closeVideo() {
        document.getElementById('video-container').classList.remove('active');
        document.getElementById('btn-back').style.display = 'none';
        document.getElementById('main-ifr').src = '';
    }
</script>
<script src="https://pl29016394.profitablecpmratenetwork.com/6f/86/b7/6f86b7ad3d7a2e5693139e1ad535ef10.js"></script>
    
</body>
</html>
