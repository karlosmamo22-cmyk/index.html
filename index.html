<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Multi-Player Pro</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --bg-dark: #000000;
            --card-bg: rgba(10, 11, 14, 0.9);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* --- GENERADOR (INPUTS) --- */
        #ui-generator {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #111;
            overflow-y: auto;
        }

        .card {
            background: #000;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #333;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        h2 { color: var(--neon-blue); margin-bottom: 20px; font-weight: 300; }
        
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: #0a0a0a;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            box-sizing: border-box;
            outline: none;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-main {
            padding: 14px;
            background: var(--neon-blue);
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-clear {
            padding: 14px;
            background: #222;
            border: none;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
        }

        #box-link {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #050505;
            border-radius: 8px;
            border: 1px dashed var(--neon-blue);
        }

        .copy-area { display: flex; gap: 5px; margin-top: 10px; }
        
        .btn-copy {
            background: var(--neon-blue);
            border: none;
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- PLAYER (RESULTADO) --- */
        #ui-player {
            display: none;
            width: 100%;
            height: 100vh;
            justify-content: center;
            align-items: center;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        /* Capa oscura sobre el fondo de imagen */
        #overlay-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1;
        }

        #menu-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 500px;
            z-index: 10;
        }

        .server-card {
            background: var(--card-bg);
            border: 2px solid var(--neon-blue);
            border-radius: 10px;
            padding: 25px 15px;
            cursor: pointer;
            text-align: center;
            position: relative;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 80px;
        }

        .server-card:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(0,212,255,0.4); }

        .card-num {
            position: absolute;
            top: 8px; left: 10px;
            font-size: 11px;
            font-weight: bold;
            color: var(--neon-blue);
        }

        .card-name {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #fff;
            text-transform: uppercase;
        }

        /* Video */
        #video-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; visibility: hidden;
            z-index: 100;
            background: #000;
        }

        #video-container.active { opacity: 1; visibility: visible; }
        iframe { width: 100%; height: 100%; border: none; }

        #btn-back {
            position: absolute;
            top: 15px; right: 15px;
            background: rgba(255,255,255,0.2);
            color: #fff; border: none;
            padding: 8px 15px; border-radius: 5px;
            cursor: pointer; z-index: 200; display: none;
        }

        @media (max-width: 480px) {
            #menu-selector { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- GENERADOR -->
    <div id="ui-generator">
        <div class="card">
            <h2>Generador Pro</h2>
            <div id="inputs-area">
                <input type="text" class="link-in" placeholder="URL Servidor 1">
                <input type="text" class="link-in" placeholder="URL Servidor 2">
                <input type="text" class="link-in" placeholder="URL Servidor 3">
                <input type="text" class="link-in" placeholder="URL Servidor 4">
                <input type="text" class="link-in" placeholder="URL Servidor 5">
                <input type="text" class="link-in" placeholder="URL Servidor 6">
                <p style="font-size: 11px; color: #777; margin: 10px 0 5px;">Imagen de Fondo (Opcional):</p>
                <input type="text" id="bg-img-in" placeholder="URL de Imagen (Fondo)">
            </div>
            
            <div class="btn-group">
                <button class="btn-main" onclick="build()">Generar</button>
                <button class="btn-clear" onclick="location.reload()">Recargar</button>
            </div>

            <div id="box-link">
                <div class="copy-area">
                    <input type="text" id="out-url" readonly>
                    <button class="btn-copy" id="btn-copy-action" onclick="copyLink()">Copiar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PLAYER -->
    <div id="ui-player">
        <div id="overlay-bg"></div>
        <button id="btn-back" onclick="closeVideo()">Cerrar Película</button>
        <div id="menu-selector"></div>
        
        <div id="video-container">
            <iframe id="main-ifr" src="" allowfullscreen></iframe>
        </div>
    </div>

<script>
    const q = new URLSearchParams(window.location.search);
    const dataEncoded = q.get('v');

    if (dataEncoded) {
        document.getElementById('ui-generator').style.display = 'none';
        document.getElementById('ui-player').style.display = 'flex';
        
        try {
            const decoded = JSON.parse(atob(dataEncoded));
            const selector = document.getElementById('menu-selector');
            
            // Poner fondo
            if (decoded.bg) {
                document.getElementById('ui-player').style.backgroundImage = `url('${decoded.bg}')`;
            }

            decoded.links.forEach((url, i) => {
                if (url && url.trim() !== "") {
                    const card = document.createElement('div');
                    card.className = 'server-card';
                    card.onclick = () => openVideo(url);
                    
                    card.innerHTML = `
                        <div class="card-num">S${i+1}</div>
                        <div class="card-name">OPCIÓN ${i+1}</div>
                    `;
                    selector.appendChild(card);
                }
            });
        } catch(e) { console.log("Error decodificando"); }
    }

    function build() {
        const inputs = document.querySelectorAll('.link-in');
        const bg = document.getElementById('bg-img-in').value;
        const links = Array.from(inputs).map(i => i.value).filter(v => v !== "");

        if (links.length === 0) return alert("Pon al menos un link");

        const data = btoa(JSON.stringify({ links, bg }));
        const base = window.location.href.split('?')[0];
        
        document.getElementById('out-url').value = `${base}?v=${data}`;
        document.getElementById('box-link').style.display = 'block';
    }

    function copyLink() {
        const out = document.getElementById('out-url');
        out.select();
        document.execCommand("copy");
        document.getElementById('btn-copy-action').innerText = "Copiado";
    }

    function openVideo(url) {
        const ifr = document.getElementById('main-ifr');
        const cont = document.getElementById('video-container');
        const btn = document.getElementById('btn-back');
        
        ifr.src = url;
        cont.classList.add('active');
        btn.style.display = 'block';
    }

    function closeVideo() {
        const ifr = document.getElementById('main-ifr');
        const cont = document.getElementById('video-container');
        const btn = document.getElementById('btn-back');
        
        cont.classList.remove('active');
        btn.style.display = 'none';
        ifr.src = '';
    }
</script>

</body>
</html>
