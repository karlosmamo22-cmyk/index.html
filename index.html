<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Multi-Player Ultra</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        /* --- GENERADOR (VISTA EDITOR) --- */
        #ui-generator {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        .card {
            background: #0d0d0d;
            padding: 35px;
            border-radius: 20px;
            border: 1px solid #333;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
        }

        h2 { color: #00d4ff; margin-bottom: 25px; font-weight: 300; letter-spacing: 1px; }
        
        .input-group { margin-bottom: 12px; position: relative; }
        
        input {
            width: 100%;
            padding: 14px;
            background: #050505;
            border: 1px solid #444;
            border-radius: 10px;
            color: #fff;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #00d4ff; box-shadow: 0 0 10px rgba(0,212,255,0.2); }

        .btn-group {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-main {
            padding: 16px;
            background: #00d4ff;
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-clear {
            padding: 16px;
            background: #333;
            border: none;
            color: #fff;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-main:hover { background: #00a8cc; transform: translateY(-2px); }
        .btn-clear:hover { background: #444; }

        #box-link {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: #111;
            border-radius: 12px;
            border: 1px dashed #00d4ff;
            animation: fadeIn 0.4s ease;
        }

        .copy-area {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-copy {
            background: #00d4ff;
            border: none;
            color: #000;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
        }

        /* --- PLAYER (VISTA FINAL) --- */
        #ui-player {
            display: none;
            width: 100%;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        #menu-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            z-index: 10;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .node {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .node:hover { transform: scale(1.15); }

        .icon {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #fff;
        }

        .c1 { background: linear-gradient(135deg, #00c6ff, #0072ff); }
        .c2 { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .c3 { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .c4 { background: linear-gradient(135deg, #2ecc71, #27ae60); }

        .tag { font-size: 13px; font-weight: 600; color: #888; letter-spacing: 1.5px; }

        #video-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease;
        }

        #video-container.active { opacity: 1; visibility: visible; }
        iframe { width: 100%; height: 100%; border: none; }

        #btn-back {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.25);
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- GENERADOR -->
    <div id="ui-generator">
        <div class="card">
            <h2>Panel de Control</h2>
            
            <input type="text" id="in-s1" placeholder="URL Servidor 1 (Principal)">
            <input type="text" id="in-s2" placeholder="URL Servidor 2">
            <input type="text" id="in-s3" placeholder="URL Servidor 3">
            <input type="text" id="in-s4" placeholder="URL Servidor 4">
            
            <div class="btn-group">
                <button class="btn-main" onclick="build()">Generar Enlace</button>
                <button class="btn-clear" onclick="clearAll()" title="Limpiar todo">Recargar</button>
            </div>

            <div id="box-link">
                <p style="margin: 0 0 10px 0; font-size: 13px; color: #00d4ff;">¡Enlace generado con éxito!</p>
                <div class="copy-area">
                    <input type="text" id="out-url" readonly>
                    <button class="btn-copy" id="btn-copy-action" onclick="copyLink()">Copiar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PLAYER -->
    <div id="ui-player">
        <button id="btn-back" onclick="reset()">Cambiar Opción</button>
        <div id="menu-selector">
            <div id="n1" class="node" style="display:none" onclick="go('s1')"><div class="icon c1">S1</div><span class="tag">OPCIÓN 1</span></div>
            <div id="n2" class="node" style="display:none" onclick="go('s2')"><div class="icon c2">S2</div><span class="tag">OPCIÓN 2</span></div>
            <div id="n3" class="node" style="display:none" onclick="go('s3')"><div class="icon c3">S3</div><span class="tag">OPCIÓN 3</span></div>
            <div id="n4" class="node" style="display:none" onclick="go('s4')"><div class="icon c4">S4</div><span class="tag">OPCIÓN 4</span></div>
        </div>
        <div id="video-container">
            <iframe id="main-ifr" src="" allowfullscreen sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"></iframe>
        </div>
    </div>

<script>
    const q = new URLSearchParams(window.location.search);
    const links = {
        s1: q.get('s1'),
        s2: q.get('s2'),
        s3: q.get('s3'),
        s4: q.get('s4')
    };

    // Modo Jugador
    if (links.s1) {
        document.getElementById('ui-generator').style.display = 'none';
        document.getElementById('ui-player').style.display = 'flex';
        for(let i=1; i<=4; i++) {
            if(links['s'+i] && links['s'+i] !== 'null' && links['s'+i] !== '') {
                document.getElementById('n'+i).style.display = 'flex';
            }
        }
    }

    // Funciones Generador
    function build() {
        const s1 = document.getElementById('in-s1').value;
        const s2 = document.getElementById('in-s2').value;
        const s3 = document.getElementById('in-s3').value;
        const s4 = document.getElementById('in-s4').value;
        
        if(!s1) {
            alert("Por favor, introduce al menos la URL del Servidor 1.");
            return;
        }

        const base = window.location.href.split('?')[0];
        const res = `${base}?s1=${encodeURIComponent(s1)}&s2=${encodeURIComponent(s2)}&s3=${encodeURIComponent(s3)}&s4=${encodeURIComponent(s4)}`;
        
        document.getElementById('out-url').value = res;
        document.getElementById('box-link').style.display = 'block';
        document.getElementById('btn-copy-action').innerText = "Copiar";
        document.getElementById('btn-copy-action').style.background = "#00d4ff";
    }

    function clearAll() {
        document.getElementById('in-s1').value = "";
        document.getElementById('in-s2').value = "";
        document.getElementById('in-s3').value = "";
        document.getElementById('in-s4').value = "";
        document.getElementById('box-link').style.display = 'none';
    }

    function copyLink() {
        const copyText = document.getElementById("out-url");
        copyText.select();
        copyText.setSelectionRange(0, 99999); // Para móviles

        try {
            document.execCommand("copy");
            const btn = document.getElementById('btn-copy-action');
            btn.innerText = "¡Copiado!";
            btn.style.background = "#2ecc71";
        } catch (err) {
            alert("No se pudo copiar automáticamente. Por favor, hazlo manual.");
        }
    }

    // Funciones Reproductor
    function go(k) {
        const menu = document.getElementById('menu-selector');
        const container = document.getElementById('video-container');
        const iframe = document.getElementById('main-ifr');
        const btn = document.getElementById('btn-back');

        menu.style.opacity = '0';
        menu.style.transform = 'scale(0.9)';
        
        setTimeout(() => {
            menu.style.visibility = 'hidden';
            iframe.src = links[k];
            container.classList.add('active');
            btn.style.display = 'block';
        }, 500);
    }

    function reset() {
        const menu = document.getElementById('menu-selector');
        const container = document.getElementById('video-container');
        const iframe = document.getElementById('main-ifr');
        const btn = document.getElementById('btn-back');

        container.classList.remove('active');
        btn.style.display = 'none';
        
        setTimeout(() => {
            iframe.src = '';
            menu.style.visibility = 'visible';
            menu.style.opacity = '1';
            menu.style.transform = 'scale(1)';
        }, 500);
    }
</script>

</body>
</html>
